<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <div class="sidebar">
        <h2>🏥 HMS</h2>
        <a href="/dashboard">Dashboard</a>
        <a href="/add">Add Medicine</a>
        <a href="/logout" class="logout">Logout</a>
    </div>

    <div class="main">

        <h1>Pharmacy Inventory</h1>

        <div class="card-container">
            <div class="card">Total Medicines<br><strong>{{ medicines|length }}</strong></div>
            <div class="card">Low Stock<br><strong>--</strong></div>
            <div class="card">Expiring Soon<br><strong>--</strong></div>
        </div>

        <table>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Qty</th>
                <th>Price</th>
                <th>Expiry</th>
                <th>Action</th>
            </tr>

            {% for med in medicines %}
            <tr>
                <td>{{med[0]}}</td>
                <td>{{med[1]}}</td>
                <td>{{med[2]}}</td>
                <td>{{med[3]}}</td>
                <td>{{med[4]}}</td>
                <td>
                    <a href="/delete/{{med[0]}}" class="delete-btn">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </table>

    </div>

</div>

</body>
</html>
